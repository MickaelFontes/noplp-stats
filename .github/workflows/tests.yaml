name: "Test: web app"

on:
  pull_request:
    branches: ["main"]

jobs:
  deploy-test-container:
    name: Test app in container
    runs-on: ubuntu-latest
    permissions:
      contents: "read"

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Build docker image
        run: |
          make docker

      - name: Test image
        run: |
          docker run --rm -d --name test_container -p 8080:8080 noplp-stats:dev
          for i in {1..30}; do
            if curl --fail -s http://localhost:8080/global > /dev/null; then
              echo "App is up!"
              break
            fi
            sleep 1
          done
          if ! curl --fail -v -o /dev/null http://localhost:8080/global; then
            echo "App did not start in time" >&2
            exit 1
          fi

  dash-testing:
    name: Run end-to-end Dash tests
    runs-on: ubuntu-latest
    permissions:
      contents: "read"

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python 3.14
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"
      - name: Install poetry
        run: |
          pipx install git+https://github.com/python-poetry/poetry.git@811a12dae0fe81f199e3f1b88b8b8be9eed543c2 #v2.4.1
          
      - name: Install dependencies
        run: |
          poetry install

      - name: Launch tests
        run: |
          export PATH=$PATH:$CHROMEWEBDRIVER
          poetry run pytest --log-cli-level INFO --log-file=tests/artifacts/pytest.log --log-file-level=DEBUG

      - name: Show timing JSON
        if: always()
        run: |
          shopt -s nullglob
          files=(tests/artifacts/timing-results-*.json)
          if [[ ${#files[@]} -eq 0 ]]; then
            echo "No timing results JSON found"
            exit 0
          fi
          for file in "${files[@]}"; do
            echo "::group::$file"
            cat "$file"
            echo "::endgroup::"
          done

      - name: Upload test logs
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: test-verbose-logs
          path: tests/artifacts/*.log
